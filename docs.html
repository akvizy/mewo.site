<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation — MEWO.ME</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --bg: #050505;
            --sidebar-bg: #0a0a0a;
            --text: #ffffff;
            --text-muted: #888888;
            --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
            --code-bg: #161616;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
        }

        aside {
            width: 300px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 40px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo-docs {
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-decoration: none;
            color: var(--text);
            display: block;
            margin-bottom: 50px;
        }

        .nav-group {
            margin-bottom: 30px;
        }

        .nav-group h4 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 15px;
        }

        .nav-group a {
            display: block;
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 12px;
            font-weight: 400;
            transition: color 0.2s;
        }

        .nav-group a:hover {
            color: var(--text-muted);
        }

        .nav-group a.active {
            color: var(--accent);
            font-weight: 600;
        }

        main {
            margin-left: 300px;
            padding: 80px 10%;
            width: 100%;
            max-width: 1100px;
        }

        .docs-header {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3rem;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.8rem;
            margin: 50px 0 20px 0;
            letter-spacing: -1px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        h3 {
            font-size: 1.2rem;
            margin: 30px 0 15px 0;
        }

        p {
            color: var(--text-muted);
            margin-bottom: 20px;
            font-weight: 300;
        }

        .code-block {
            background: var(--code-bg);
            border: 1px solid var(--border);
            padding: 15px 20px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #ccc;
            border-radius: 4px;
            margin-bottom: 20px;
            position: relative;
        }

        .badge {
            background: var(--border);
            padding: 2px 8px;
            font-size: 0.7rem;
            border-radius: 3px;
            text-transform: uppercase;
            margin-right: 5px;
        }

        .lang-footer {
            margin-top: 100px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 20px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 5px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .lang-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 900px) {
            aside { width: 220px; padding: 20px; }
            main { margin-left: 220px; padding: 60px 5%; }
        }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            aside { position: static; width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
            main { margin-left: 0; }
        }
    </style>
</head>
<body>

    <aside>
        <a href="https://mewo.site/" class="logo-docs">MEWO</a>
    </aside>

    <script>
        function setLanguage(lang) {
            const elements = document.querySelectorAll('[data-lang-en]');
            elements.forEach(el => {
                const translation = el.getAttribute(`data-lang-${lang}`);
                if (translation) {
                    el.textContent = translation;
                }
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase().includes(lang === 'en' ? 'eng' : 'rus')) {
                    btn.classList.add('active');
                }
            });
        }
    </script>
</body>
</html>
