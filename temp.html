<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Under Development — MEWO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --bg: #050505;
            --text: #ffffff;
            --text-muted: #888888;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
        }

        [data-aos] {
            pointer-events: none;
        }
        .aos-animate {
            pointer-events: auto !important;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            text-align: center;
            padding: 40px 20px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .back-link {
             position: fixed;
            top: 40px;
            left: 40px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-link:hover { color: #fff; }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 60px 0;
        }

        .status-tag {
            font-size: 0.7rem;
            padding: 4px 12px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -3px;
            margin-bottom: 15px;
            line-height: 1;
        }

        p {
            color: var(--text-muted);
            max-width: 500px;
            font-weight: 300;
            line-height: 1.6;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .loader-container {
            width: 200px;
            height: 1px;
            background: var(--accent);
            position: relative;
            margin-bottom: 50px;
            transform: scaleX(0);
            opacity: 0;
            animation: revealLine 2.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            animation-delay: 1.5s;
        }

        @keyframes revealLine {
            0% { transform: scaleX(0); opacity: 0; }
            100% { transform: scaleX(1); opacity: 1; }
        }

        .donate-btn {
            display: inline-block;
            padding: 14px 34px;
            border: 1px solid var(--border);
            color: var(--text);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            margin-bottom: 40px;
            background: transparent;
            position: relative;
            overflow: hidden;
        }

        .donate-btn:hover {
            border-color: var(--accent);
            background: var(--accent);
            color: #000;
            transform: translateY(-3px);
        }

        .lang-switch {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            padding-bottom: 40px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 14px;
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            letter-spacing: 1px;
        }

        .lang-btn.active {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 768px) {
            .back-link { position: relative; top: 0; left: 0; margin-bottom: 40px; align-self: flex-start; }
            body { padding: 40px 20px; overflow-y: auto; }
            main { justify-content: flex-start; padding-top: 20px; }
            .loader-container { width: 160px; }
        }
    </style>
</head>
<body>

    <a href="https://mewo.site/" class="back-link" data-lang-en="← Back" data-lang-ru="← Назад">← Back</a>

    <main>
        <div class="status-tag" data-aos="fade-down" data-aos-delay="200" data-lang-en="Work in progress" data-lang-ru="В разработке">Work in progress</div>
        
        <h1 data-aos="fade-up" data-aos-delay="400" data-lang-en="Coming Soon" data-lang-ru="Скоро будет">Coming Soon</h1>
        
        <p data-aos="fade-up" data-aos-delay="600" 
           data-lang-en="We are currently polishing the client to ensure the best possible experience. Stay tuned for updates in our Discord."
           data-lang-ru="Сейчас мы дорабатываем клиент, чтобы обеспечить наилучший результат. Следите за обновлениями в нашем Discord.">
            We are currently polishing the client to ensure the best possible experience. Stay tuned for updates in our Discord.
        </p>

        <div class="loader-container"></div>

        <a href="https://www.donationalerts.com/r/akvis" target="_blank" rel="noopener noreferrer" class="donate-btn" 
           data-aos="fade-up" data-aos-delay="1800"
           data-lang-en="Support Development" data-lang-ru="Поддержать разработку">
            Support Development
        </a>

        <div class="lang-switch" data-aos="fade-up" data-aos-delay="2000">
            <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            duration: 1000,
            once: true,
            easing: 'ease-out-quart',
            startEvent: 'DOMContentLoaded'
        });

        window.addEventListener('load', () => {
            AOS.refresh();
        });

        function setLanguage(lang) {
            const elements = document.querySelectorAll('[data-lang-en]');
            elements.forEach(el => {
                const translation = el.getAttribute(`data-lang-${lang}`);
                if (translation) {
                    el.textContent = translation;
                }
            });

            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase() === lang) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
