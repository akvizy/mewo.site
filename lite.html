<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lite Edition — MEWO</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ffffff;
            --secondary: #111111;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .back-btn {
            position: fixed;
            top: 40px;
            left: 40px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-btn:hover { color: var(--accent); }

        .header { text-align: center; margin-bottom: 60px; }
        .header h1 { font-size: 3rem; letter-spacing: -2px; margin-bottom: 10px; }
        .header p { color: var(--text-muted); font-weight: 300; }

        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        .price-card {
            background: var(--secondary);
            border: 1px solid var(--border);
            padding: 40px 20px;
            text-align: center;
            transition: 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            overflow: hidden;
        }

        .price-card:hover {
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-5px);
        }

        .duration {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: block;
        }

        .amount {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            display: block;
        }

        .buy-btn {
            background: var(--accent);
            color: #000;
            text-decoration: none;
            padding: 12px 0;
            display: block;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .buy-btn:hover {
            background: transparent;
            color: var(--accent);
            outline: 1px solid var(--accent);
        }

        .lang-switch {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 15px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 5px 12px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .lang-btn.active { border-color: var(--accent); color: var(--accent); }

        @media (max-width: 768px) {
            .back-btn { top: 20px; left: 20px; }
            .header h1 { font-size: 2rem; }
            .price-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn" data-lang-en="← Back" data-lang-ru="← Назад">← Back</a>

    <div class="header" data-aos="fade-down">
        <h1 data-lang-en="LITE EDITION" data-lang-ru="LITE EDITION">LITE EDITION</h1>
        <p data-lang-en="Select your preferred subscription period" data-lang-ru="Выберите подходящий период подписки">Select your preferred subscription period</p>
    </div>

    <div class="price-grid">
        <div class="price-card" data-aos="fade-up" data-aos-delay="100">
            <span class="duration" data-lang-en="7 Days" data-lang-ru="7 Дней">7 Days</span>
            <span class="amount">$1.99</span>
            <a href="#" class="buy-btn" data-lang-en="Purchase" data-lang-ru="Купить">Purchase</a>
        </div>
        <div class="price-card" data-aos="fade-up" data-aos-delay="200">
            <span class="duration" data-lang-en="30 Days" data-lang-ru="30 Дней">30 Days</span>
            <span class="amount">$3.99</span>
            <a href="#" class="buy-btn" data-lang-en="Purchase" data-lang-ru="Купить">Purchase</a>
        </div>
        <div class="price-card" data-aos="fade-up" data-aos-delay="300">
            <span class="duration" data-lang-en="90 Days" data-lang-ru="90 Дней">90 Days</span>
            <span class="amount">$8.99</span>
            <a href="#" class="buy-btn" data-lang-en="Purchase" data-lang-ru="Купить">Purchase</a>
        </div>
        <div class="price-card" data-aos="fade-up" data-aos-delay="400">
            <span class="duration" data-lang-en="Lifetime" data-lang-ru="Навсегда">Lifetime</span>
            <span class="amount">$24.99</span>
            <a href="#" class="buy-btn" data-lang-en="Purchase" data-lang-ru="Купить">Purchase</a>
        </div>
    </div>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ once: true });
        function setLanguage(lang) {
            document.querySelectorAll('[data-lang-en]').forEach(el => {
                el.textContent = el.getAttribute(`data-lang-${lang}`);
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.textContent.toLowerCase() === lang) btn.classList.add('active');
            });
        }
    </script>
</body>
</html>
